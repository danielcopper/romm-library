sonar.projectKey=danielcopper_decky-romm-sync
sonar.organization=danielcopper

# Sources
sonar.sources=py_modules,src,main.py
sonar.tests=tests
sonar.python.version=3.12

# Coverage
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/defaults/**,**/bin/**,**/__pycache__/**
sonar.coverage.exclusions=**/tests/**,**/conftest.py,src/**

# Suppress false positives
# S6926: "async without await" — Decky Loader callable framework requires all
# exposed methods to be async, even when they only delegate to sync service calls.
sonar.issue.ignore.multicriteria=fp1,fp2,fp3,fp4
sonar.issue.ignore.multicriteria.fp1.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.fp1.resourceKey=main.py
# S7503 also fires on service methods that are async for run_in_executor wrapping
sonar.issue.ignore.multicriteria.fp2.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.fp2.resourceKey=py_modules/services/**
# S4830 (cert validation) + S5527 (hostname verification): SSL verification is
# intentionally optional — user-facing setting (allow_insecure_ssl) for
# self-hosted RomM servers with self-signed certificates.
sonar.issue.ignore.multicriteria.fp3.ruleKey=python:S4830
sonar.issue.ignore.multicriteria.fp3.resourceKey=py_modules/adapters/romm/http.py
sonar.issue.ignore.multicriteria.fp4.ruleKey=python:S5527
sonar.issue.ignore.multicriteria.fp4.resourceKey=py_modules/adapters/romm/http.py
