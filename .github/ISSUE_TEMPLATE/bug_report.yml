name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the details below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Plugin version
      description: Which version of decky-romm-sync are you running?
      placeholder: "e.g. 0.12.0"
    validations:
      required: true

  - type: input
    id: romm-version
    attributes:
      label: RomM server version
      description: Which version of RomM is your server running?
      placeholder: "e.g. 4.6.1 or 4.7.0"
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Steam Deck (LCD)
        - Steam Deck (OLED)
        - Linux Desktop
        - Other
    validations:
      required: true

  - type: dropdown
    id: emulator
    attributes:
      label: Emulator platform
      options:
        - RetroDECK
        - EmuDeck
        - Standalone RetroArch
        - Other / N/A
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs. what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open QAM > Decky > RomM Sync
        2. Click "Sync Library"
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant logs from Decky's log viewer or `~/homebrew/logs/decky-romm-sync/`.
        Set log level to "debug" in plugin settings to get detailed output.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, platform details, ROM info, anything else that might help.
