name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for decky-romm-sync? Describe it below!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why do you want this?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought of?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Sync / Library
        - Downloads
        - Save Sync
        - BIOS / Firmware
        - Artwork
        - Game Detail Page
        - Settings / UI
        - Achievements
        - Other
    validations:
      required: true
